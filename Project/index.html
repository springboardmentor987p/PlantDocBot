<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantDoc Bot - AI Diagnosis</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

    <!-- Pastel theme for main panels inside the app box -->
    <style>
      body {
        background: linear-gradient(135deg, #18181b 0%, #23272f 100%);
        color: #d1d5db;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #root {
        box-shadow: 0 0 32px 0 #1e293b80;
        border-radius: 1.5rem;
        padding: 2rem 0;
        background: rgba(30, 41, 59, 0.95);
        min-width: 340px;
        width: 100%;
        max-width: 1100px;
        min-height: 60vh;
        margin: 2rem auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        width: 100%;
      }
      @media (max-width: 900px) {
        .main-grid {
          grid-template-columns: 1fr;
          gap: 1rem;
        }
      }
      .upload-box, .result-box {
        border-radius: 1rem;
        box-shadow: 0 2px 12px #b2ebf240;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        background: linear-gradient(135deg, #e0f7fa 0%, #f1f5f9 100%);
        border: 1px solid #b2ebf2;
        color: #334155;
        min-height: 350px;
        display: flex;
        flex-direction: column;
      }
      .upload-box h2, .result-box h2 {
        color: #1e293b; /* slate-800 */
        font-weight: 700;
        letter-spacing: 0.02em;
        margin-bottom: 1rem;
      }
      .upload-box h1, .result-box h1 {
        color: #2563eb; /* blue-600 */
        font-weight: 800;
        letter-spacing: 0.03em;
        margin-bottom: 1rem;
      }
      .upload-box, .result-box {
        font-size: 1.05rem;
      }
      .btn-primary {
        background: linear-gradient(90deg, #2563eb 0%, #38bdf8 100%);
        color: #f1f5f9;
        border-radius: 0.5rem;
        box-shadow: 0 2px 8px #2563eb40;
        border: none;
        padding: 0.5rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        margin-top: 1rem;
        cursor: pointer;
        transition: box-shadow 0.2s, background 0.2s;
      }
      .btn-primary:hover {
        background: linear-gradient(90deg, #38bdf8 0%, #2563eb 100%);
        color: #f1f5f9;
        box-shadow: 0 4px 16px #2563eb40;
      }
      @media (max-width: 700px) {
        #root {
          max-width: 98vw;
          min-height: 90vh;
          padding: 1rem 0.5rem;
        }
        .main-grid {
          gap: 1rem;
        }
        .upload-box, .result-box {
          padding: 1rem;
          min-height: 220px;
        }
      }
    </style>

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script src="./PlantDocApp.jsx" type="text/babel"></script>
</body>
</html>
