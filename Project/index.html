<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantDoc Bot - AI Diagnosis</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Tailwind CSS (for styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configure Tailwind to use the 'Inter' font (now in style.css) -->
    <link rel="stylesheet" href="style.css">

    <!-- Load React and ReactDOM Libraries -->
    <!-- These MUST be loaded before your app code -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Load Babel Standalone Compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- The Root Container -->
    <!-- React will render the entire application inside this div -->
    <div id="root"></div>

    <!-- The React application logic is now in PlantDocApp.jsx -->
    <script src="./PlantDocApp.jsx" type="text/babel"></script>
</body>
</html>
